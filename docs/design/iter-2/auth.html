<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — gakudo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2"/><path d="M12 8c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4"/><path d="M12 2v6"/><path d="M12 16v6"/><path d="M2 12h6"/><path d="M16 12h6"/><path d="M4.93 4.93l4.24 4.24"/><path d="M14.83 14.83l4.24 4.24"/><path d="M19.07 4.93l-4.24 4.24"/><path d="M9.17 14.83l-4.24 4.24"/></svg>
      </span>
      <span class="auth-logo-text">gakudo</span>
    </div>

    <h1 class="auth-title">ログイン</h1>
    <p class="auth-desc">メールアドレスとパスワードを入力してください</p>

    <form action="#" method="post" novalidate>
      <div class="form-group">
        <label for="email" class="form-label">メールアドレス</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          placeholder="tanaka@example.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password" class="form-label">パスワード</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="margin-top:var(--space-2);">
        ログイン
      </button>
    </form>

    <!-- Error state example (hidden — shows how validation errors render)

          required

          aria-describedby="password-error"

        >
        <p class="form-error" id="password-error" role="alert">パスワードを入力してください</p>

      <button type="submit" class="btn btn-primary btn-block" style="margin-top:var(--space-2);">
        ログイン
      </button>
    </form>
    -->

    <div class="auth-footer">
      <a href="#">パスワードをお忘れですか？</a>
    </div>
  </div>
</main>

</body>
</html>
