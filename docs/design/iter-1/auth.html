<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — gakudo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon" aria-hidden="true">🌻</span>
      <span class="auth-logo-text">gakudo</span>
    </div>

    <h1 class="auth-title">ログイン</h1>
    <p class="auth-desc">メールアドレスとパスワードを入力してください</p>

    <form action="#" method="post" novalidate>
      <div class="form-group">
        <label for="email" class="form-label">メールアドレス</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          placeholder="tanaka@example.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password" class="form-label">パスワード</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:var(--space-2);">
        ログイン
      </button>
    </form>

    <div class="auth-footer">
      <a href="#">パスワードをお忘れですか？</a>
    </div>
  </div>
</main>

</body>
</html>
