<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Playground — がくどう</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      font-size: 13px;
      display: flex;
      background: #12121e;
      color: #e0e0e0;
    }

    /* ── Panels ── */
    .panel { height: 100vh; overflow-y: auto; padding: 16px; }
    .panel::-webkit-scrollbar { width: 6px; }
    .panel::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .panel-left, .panel-right {
      width: 280px; min-width: 280px;
      background: #1a1a2e; flex-shrink: 0;
    }
    .panel-center { flex: 1; background: #0f0f1a; padding: 12px; display: flex; flex-direction: column; }

    .panel-title {
      font-size: 14px; font-weight: 700; margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 1px solid #2a2a40;
      color: #b0b0d0;
      letter-spacing: 0.04em;
    }

    /* ── Controls ── */
    .ctrl-group { margin-bottom: 16px; }
    .ctrl-label {
      display: block; font-size: 11px; font-weight: 600;
      color: #888; margin-bottom: 4px; text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .ctrl-sublabel {
      display: block; font-size: 11px; color: #666; margin-bottom: 3px;
    }

    select, input[type="range"], input[type="color"], textarea, button {
      font-family: inherit;
    }

    select {
      width: 100%; height: 30px; padding: 0 8px;
      background: #252540; color: #e0e0e0; border: 1px solid #333;
      border-radius: 4px; font-size: 12px; cursor: pointer;
    }

    input[type="range"] {
      width: 100%; height: 4px; -webkit-appearance: none;
      background: #333; border-radius: 2px; outline: none; margin: 6px 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      background: #6366f1; border-radius: 50%; cursor: pointer;
    }

    input[type="color"] {
      width: 32px; height: 24px; padding: 0; border: 1px solid #333;
      border-radius: 3px; cursor: pointer; background: transparent;
    }

    .color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .color-row-label { flex: 1; font-size: 11px; color: #aaa; }
    .color-row-value { font-size: 10px; color: #666; font-family: monospace; min-width: 60px; }

    .slider-row { display: flex; align-items: center; gap: 6px; }
    .slider-value { font-size: 10px; color: #888; font-family: monospace; min-width: 36px; text-align: right; }

    /* ── Preset buttons ── */
    .preset-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .preset-btn {
      padding: 4px 10px; font-size: 11px; font-weight: 500;
      background: #252540; color: #c0c0e0; border: 1px solid #333;
      border-radius: 4px; cursor: pointer; transition: all 0.15s;
    }
    .preset-btn:hover { background: #333360; border-color: #555; }
    .preset-btn.is-active { background: #6366f1; color: #fff; border-color: #6366f1; }

    /* ── iframe ── */
    .preview-frame {
      flex: 1; border: none; border-radius: 6px;
      background: #fff; width: 100%;
    }

    /* ── Right panel (output) ── */
    .diff-output {
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px;
      line-height: 1.6; color: #a0d0a0; background: #141428;
      border: 1px solid #252540; border-radius: 4px;
      padding: 10px; min-height: 120px; white-space: pre-wrap;
      word-break: break-all; margin-bottom: 12px;
    }

    .rationale-area {
      width: 100%; height: 80px; padding: 8px;
      background: #252540; color: #e0e0e0; border: 1px solid #333;
      border-radius: 4px; font-size: 12px; resize: vertical;
    }

    .action-btn {
      width: 100%; height: 34px; margin-top: 8px;
      background: #6366f1; color: #fff; border: none;
      border-radius: 4px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .action-btn:hover { background: #5558e8; }
    .action-btn.btn-reset { background: #333; color: #ccc; }
    .action-btn.btn-reset:hover { background: #444; }

    .copy-feedback {
      text-align: center; font-size: 11px; color: #6366f1;
      margin-top: 4px; height: 16px;
    }

    /* HSL sub-controls */
    .hsl-group { margin-top: 6px; padding-left: 4px; }
  </style>
</head>
<body>

<!-- ========== LEFT PANEL ========== -->
<div class="panel panel-left">
  <div class="panel-title">Design Controls</div>

  <!-- Screen selector -->
  <div class="ctrl-group">
    <label class="ctrl-label">Screen</label>
    <select id="screenSelect">
      <option value="index">index (公開トップ)</option>
      <option value="auth">auth (ログイン)</option>
      <option value="teacher">teacher (先生ダッシュボード)</option>
      <option value="scan">scan (入退場スキャン)</option>
      <option value="parent">parent (保護者ホーム)</option>
    </select>
  </div>

  <!-- Presets -->
  <div class="ctrl-group">
    <label class="ctrl-label">Presets</label>
    <div class="preset-grid">
      <button class="preset-btn is-active" data-preset="natural">ナチュラル</button>
      <button class="preset-btn" data-preset="simple">シンプル</button>
      <button class="preset-btn" data-preset="soft">やわらか</button>
      <button class="preset-btn" data-preset="tech">テクニカル</button>
      <button class="preset-btn" data-preset="vivid">ビビッド</button>
    </div>
  </div>

  <!-- Accent Color -->
  <div class="ctrl-group">
    <label class="ctrl-label">Accent Color</label>
    <div class="color-row">
      <span class="color-row-label">--color-accent</span>
      <input type="color" id="accentColor" value="#2D9D78">
      <span class="color-row-value" id="accentValue">#2D9D78</span>
    </div>
    <div class="hsl-group">
      <div class="ctrl-sublabel">Hue</div>
      <div class="slider-row"><input type="range" id="accentH" min="0" max="360" value="159"><span class="slider-value" id="accentHVal">159</span></div>
      <div class="ctrl-sublabel">Saturation</div>
      <div class="slider-row"><input type="range" id="accentS" min="0" max="100" value="54"><span class="slider-value" id="accentSVal">54%</span></div>
      <div class="ctrl-sublabel">Lightness</div>
      <div class="slider-row"><input type="range" id="accentL" min="0" max="100" value="40"><span class="slider-value" id="accentLVal">40%</span></div>
    </div>
  </div>

  <!-- Other Colors -->
  <div class="ctrl-group">
    <label class="ctrl-label">Background & Text</label>
    <div class="color-row">
      <span class="color-row-label">--color-bg</span>
      <input type="color" id="colorBg" value="#FAFAF8">
      <span class="color-row-value" id="colorBgValue">#FAFAF8</span>
    </div>
    <div class="color-row">
      <span class="color-row-label">--color-fg</span>
      <input type="color" id="colorFg" value="#1A1A1A">
      <span class="color-row-value" id="colorFgValue">#1A1A1A</span>
    </div>
    <div class="color-row">
      <span class="color-row-label">--color-border</span>
      <input type="color" id="colorBorder" value="#E5E5E3">
      <span class="color-row-value" id="colorBorderValue">#E5E5E3</span>
    </div>
  </div>

  <!-- Typography -->
  <div class="ctrl-group">
    <label class="ctrl-label">Typography</label>
    <select id="fontSelect">
      <option value="'Noto Sans JP', system-ui, sans-serif">Noto Sans JP</option>
      <option value="system-ui, sans-serif">system-ui</option>
      <option value="'Hiragino Sans', sans-serif">Hiragino Sans</option>
      <option value="'Yu Gothic', sans-serif">Yu Gothic</option>
    </select>
  </div>

  <!-- Border Radius -->
  <div class="ctrl-group">
    <label class="ctrl-label">Border Radius</label>
    <div class="slider-row">
      <input type="range" id="radiusSlider" min="0" max="16" value="8" step="1">
      <span class="slider-value" id="radiusValue">8px</span>
    </div>
  </div>

  <!-- Shadow -->
  <div class="ctrl-group">
    <label class="ctrl-label">Shadow Intensity</label>
    <select id="shadowSelect">
      <option value="none">なし</option>
      <option value="subtle">控えめ</option>
      <option value="standard" selected>標準</option>
      <option value="strong">強め</option>
    </select>
  </div>

  <!-- Spacing -->
  <div class="ctrl-group">
    <label class="ctrl-label">Spacing Scale</label>
    <div class="slider-row">
      <input type="range" id="spacingSlider" min="0.8" max="1.2" value="1.0" step="0.05">
      <span class="slider-value" id="spacingValue">1.0x</span>
    </div>
  </div>
</div>

<!-- ========== CENTER PANEL ========== -->
<div class="panel-center">
  <iframe id="previewFrame" class="preview-frame"></iframe>
</div>

<!-- ========== RIGHT PANEL ========== -->
<div class="panel panel-right">
  <div class="panel-title">Token Diff</div>
  <div class="diff-output" id="diffOutput">No changes yet.</div>

  <label class="ctrl-label">Rationale (optional)</label>
  <textarea class="rationale-area" id="rationale" placeholder="Why these changes? e.g. 'Warmer feel for parent-facing pages'"></textarea>

  <button class="action-btn" id="copyBtn">Copy Prompt</button>
  <div class="copy-feedback" id="copyFeedback"></div>

  <button class="action-btn btn-reset" id="resetBtn">Reset to Defaults</button>
</div>

    <button class="bottom-nav-item is-active"><span class="icon icon-20 bottom-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>ホーム</button>
    <button class="bottom-nav-item"><span class="icon icon-20 bottom-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>入退場</button>

// ──────────────────────────────────────────────
// DEFAULT VALUES
// ──────────────────────────────────────────────
var DEFAULTS = {
  accentH: 159, accentS: 54, accentL: 40,
  colorBg: '#FAFAF8', colorFg: '#1A1A1A', colorBorder: '#E5E5E3',
  font: "'Noto Sans JP', system-ui, sans-serif",
  radius: 8,      // base px — sm=radius/2, md=radius, lg=radius*1.5
  shadow: 'standard',
  spacing: 1.0
};

// ──────────────────────────────────────────────
// PRESETS
// ──────────────────────────────────────────────
var PRESETS = {
  natural: { accentH: 159, accentS: 54, accentL: 40, colorBg: '#FAFAF8', colorFg: '#1A1A1A', colorBorder: '#E5E5E3', font: "'Noto Sans JP', system-ui, sans-serif", radius: 8, shadow: 'standard', spacing: 1.0 },
  simple:  { accentH: 217, accentS: 91, accentL: 60, colorBg: '#FFFFFF', colorFg: '#111827', colorBorder: '#E5E7EB', font: "'Noto Sans JP', system-ui, sans-serif", radius: 2, shadow: 'none', spacing: 0.9 },
  soft:    { accentH: 38,  accentS: 92, accentL: 50, colorBg: '#FFFDF7', colorFg: '#1A1A1A', colorBorder: '#F0E6D3', font: "'Noto Sans JP', system-ui, sans-serif", radius: 12, shadow: 'standard', spacing: 1.1 },
  tech:    { accentH: 239, accentS: 84, accentL: 67, colorBg: '#F9FAFB', colorFg: '#111827', colorBorder: '#D1D5DB', font: "system-ui, sans-serif", radius: 0, shadow: 'subtle', spacing: 0.85 },
  vivid:   { accentH: 330, accentS: 81, accentL: 60, colorBg: '#FAFAF8', colorFg: '#1A1A1A', colorBorder: '#E5E5E3', font: "'Noto Sans JP', system-ui, sans-serif", radius: 8, shadow: 'strong', spacing: 1.0 }
};

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
var state = Object.assign({}, DEFAULTS);
var currentScreen = 'index';

// ──────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────
function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  var a = s * Math.min(l, 1 - l);
  function f(n) {
    var k = (n + h / 30) % 12;
    var color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  }
  return '#' + f(0) + f(8) + f(4);
}

function hexToHsl(hex) {
  var r = parseInt(hex.slice(1, 3), 16) / 255;
  var g = parseInt(hex.slice(3, 5), 16) / 255;
  var b = parseInt(hex.slice(5, 7), 16) / 255;
  var max = Math.max(r, g, b), min = Math.min(r, g, b);
  var h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    var d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else h = ((r - g) / d + 4) / 6;
    h *= 360;
  }
  return [Math.round(h), Math.round(s * 100), Math.round(l * 100)];
}

function darkenHex(hex, amount) {
  var hsl = hexToHsl(hex);
  return hslToHex(hsl[0], hsl[1], Math.max(0, hsl[2] - amount));
}

function lightenHex(hex, amount) {
  var hsl = hexToHsl(hex);
  return hslToHex(hsl[0], Math.max(0, hsl[1] - 20), Math.min(100, hsl[2] + amount));
}

function getShadows(level) {
  switch (level) {
    case 'none': return { sm: 'none', md: 'none', lg: 'none' };
    case 'subtle': return { sm: '0 1px 1px rgba(0,0,0,0.03)', md: '0 1px 2px rgba(0,0,0,0.05)', lg: '0 2px 6px rgba(0,0,0,0.06)' };
    case 'standard': return { sm: '0 1px 2px rgba(0,0,0,0.05)', md: '0 2px 4px rgba(0,0,0,0.08)', lg: '0 4px 12px rgba(0,0,0,0.10)' };
    case 'strong': return { sm: '0 2px 4px rgba(0,0,0,0.10)', md: '0 4px 8px rgba(0,0,0,0.14)', lg: '0 8px 24px rgba(0,0,0,0.18)' };
  }
}

// ──────────────────────────────────────────────
// RENDER IFRAME
// ──────────────────────────────────────────────
function renderPreview() {
  var accent = hslToHex(state.accentH, state.accentS, state.accentL);
  var accentHv = darkenHex(accent, 12);
  var accentSoft = lightenHex(accent, 40);
  var shadows = getShadows(state.shadow);
  var sp = state.spacing;
  var r = state.radius;

  var overrides = ':root {\n';
  overrides += '  --color-accent: ' + accent + ';\n';
  overrides += '  --color-accent-hv: ' + accentHv + ';\n';
  overrides += '  --color-accent-soft: ' + accentSoft + ';\n';
  overrides += '  --color-bg: ' + state.colorBg + ';\n';
  overrides += '  --color-fg: ' + state.colorFg + ';\n';
  overrides += '  --color-border: ' + state.colorBorder + ';\n';
  overrides += '  --color-border-focus: ' + accent + ';\n';
  overrides += '  --color-checkin: ' + accent + ';\n';
  overrides += '  --font-sans: ' + state.font + ';\n';
  overrides += '  --radius-sm: ' + (r * 0.5) + 'px;\n';
  overrides += '  --radius-md: ' + r + 'px;\n';
  overrides += '  --radius-lg: ' + (r * 1.5) + 'px;\n';
  overrides += '  --shadow-sm: ' + shadows.sm + ';\n';
  overrides += '  --shadow-md: ' + shadows.md + ';\n';
  overrides += '  --shadow-lg: ' + shadows.lg + ';\n';
  // Spacing overrides
  overrides += '  --space-1: ' + (0.25 * sp).toFixed(3) + 'rem;\n';
  overrides += '  --space-2: ' + (0.5 * sp).toFixed(3) + 'rem;\n';
  overrides += '  --space-3: ' + (0.75 * sp).toFixed(3) + 'rem;\n';
  overrides += '  --space-4: ' + (1.0 * sp).toFixed(3) + 'rem;\n';
  overrides += '  --space-5: ' + (1.25 * sp).toFixed(3) + 'rem;\n';
  overrides += '  --space-6: ' + (1.5 * sp).toFixed(3) + 'rem;\n';
  overrides += '  --space-8: ' + (2.0 * sp).toFixed(3) + 'rem;\n';
  overrides += '  --space-10: ' + (2.5 * sp).toFixed(3) + 'rem;\n';
  overrides += '  --space-12: ' + (3.0 * sp).toFixed(3) + 'rem;\n';
  overrides += '  --space-16: ' + (4.0 * sp).toFixed(3) + 'rem;\n';
  overrides += '}\n';

  var html = '<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>' + SHARED_CSS + '</style><style>' + overrides + '</style></head><body>' + SCREENS[currentScreen] + '</body></html>';

  var frame = document.getElementById('previewFrame');
  frame.srcdoc = html;
}

// ──────────────────────────────────────────────
// DIFF OUTPUT
// ──────────────────────────────────────────────
function updateDiff() {
  var lines = [];
  var accent = hslToHex(state.accentH, state.accentS, state.accentL);
  var defaultAccent = hslToHex(DEFAULTS.accentH, DEFAULTS.accentS, DEFAULTS.accentL);

  if (accent !== defaultAccent) {
    lines.push('--color-accent: ' + defaultAccent + ' -> ' + accent);
  }
  if (state.colorBg !== DEFAULTS.colorBg) {
    lines.push('--color-bg: ' + DEFAULTS.colorBg + ' -> ' + state.colorBg);
  }
  if (state.colorFg !== DEFAULTS.colorFg) {
    lines.push('--color-fg: ' + DEFAULTS.colorFg + ' -> ' + state.colorFg);
  }
  if (state.colorBorder !== DEFAULTS.colorBorder) {
    lines.push('--color-border: ' + DEFAULTS.colorBorder + ' -> ' + state.colorBorder);
  }
  if (state.font !== DEFAULTS.font) {
    lines.push('--font-sans: ' + DEFAULTS.font + ' -> ' + state.font);
  }
  if (state.radius !== DEFAULTS.radius) {
    lines.push('--radius-md: ' + DEFAULTS.radius + 'px -> ' + state.radius + 'px');
  }
  if (state.shadow !== DEFAULTS.shadow) {
    var shadowLabels = { none: 'なし', subtle: '控えめ', standard: '標準', strong: '強め' };
    lines.push('shadow: ' + shadowLabels[DEFAULTS.shadow] + ' -> ' + shadowLabels[state.shadow]);
  }
  if (state.spacing !== DEFAULTS.spacing) {
    lines.push('spacing: ' + DEFAULTS.spacing.toFixed(2) + 'x -> ' + state.spacing.toFixed(2) + 'x');
  }

  document.getElementById('diffOutput').textContent = lines.length ? lines.join('\n') : 'No changes yet.';
}

// ──────────────────────────────────────────────
// SYNC CONTROLS <-> STATE
// ──────────────────────────────────────────────
function syncControlsFromState() {
  var accent = hslToHex(state.accentH, state.accentS, state.accentL);
  document.getElementById('accentColor').value = accent;
  document.getElementById('accentValue').textContent = accent.toUpperCase();
  document.getElementById('accentH').value = state.accentH;
  document.getElementById('accentHVal').textContent = state.accentH;
  document.getElementById('accentS').value = state.accentS;
  document.getElementById('accentSVal').textContent = state.accentS + '%';
  document.getElementById('accentL').value = state.accentL;
  document.getElementById('accentLVal').textContent = state.accentL + '%';

  document.getElementById('colorBg').value = state.colorBg;
  document.getElementById('colorBgValue').textContent = state.colorBg.toUpperCase();
  document.getElementById('colorFg').value = state.colorFg;
  document.getElementById('colorFgValue').textContent = state.colorFg.toUpperCase();
  document.getElementById('colorBorder').value = state.colorBorder;
  document.getElementById('colorBorderValue').textContent = state.colorBorder.toUpperCase();

  document.getElementById('fontSelect').value = state.font;
  document.getElementById('radiusSlider').value = state.radius;
  document.getElementById('radiusValue').textContent = state.radius + 'px';
  document.getElementById('shadowSelect').value = state.shadow;
  document.getElementById('spacingSlider').value = state.spacing;
  document.getElementById('spacingValue').textContent = state.spacing.toFixed(2) + 'x';
}

function onControlChange() {
  renderPreview();
  updateDiff();
  // clear preset highlight
  document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('is-active'); });
  // check if current state matches a preset
  Object.keys(PRESETS).forEach(function(key) {
    var p = PRESETS[key];
    if (p.accentH === state.accentH && p.accentS === state.accentS && p.accentL === state.accentL &&
        p.colorBg === state.colorBg && p.colorFg === state.colorFg && p.colorBorder === state.colorBorder &&
        p.font === state.font && p.radius === state.radius && p.shadow === state.shadow &&
        Math.abs(p.spacing - state.spacing) < 0.01) {
      document.querySelector('[data-preset="' + key + '"]').classList.add('is-active');
    }
  });
}

// ──────────────────────────────────────────────
// EVENT WIRING
// ──────────────────────────────────────────────

// Screen selector
document.getElementById('screenSelect').addEventListener('change', function() {
  currentScreen = this.value;
  renderPreview();
});

// Presets
document.querySelectorAll('.preset-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var p = PRESETS[this.getAttribute('data-preset')];
    Object.assign(state, p);
    syncControlsFromState();
    onControlChange();
  });
});

// Accent color picker
document.getElementById('accentColor').addEventListener('input', function() {
  var hsl = hexToHsl(this.value);
  state.accentH = hsl[0]; state.accentS = hsl[1]; state.accentL = hsl[2];
  syncControlsFromState();
  onControlChange();
});

// HSL sliders
['accentH', 'accentS', 'accentL'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', function() {
    state[id] = parseInt(this.value);
    var accent = hslToHex(state.accentH, state.accentS, state.accentL);
    document.getElementById('accentColor').value = accent;
    document.getElementById('accentValue').textContent = accent.toUpperCase();
    document.getElementById('accentHVal').textContent = state.accentH;
    document.getElementById('accentSVal').textContent = state.accentS + '%';
    document.getElementById('accentLVal').textContent = state.accentL + '%';
    onControlChange();
  });
});

// Color pickers (bg, fg, border)
[['colorBg', 'colorBgValue'], ['colorFg', 'colorFgValue'], ['colorBorder', 'colorBorderValue']].forEach(function(pair) {
  document.getElementById(pair[0]).addEventListener('input', function() {
    state[pair[0]] = this.value.toUpperCase();
    document.getElementById(pair[1]).textContent = this.value.toUpperCase();
    onControlChange();
  });
});

// Font
document.getElementById('fontSelect').addEventListener('change', function() {
  state.font = this.value;
  onControlChange();
});

// Radius
document.getElementById('radiusSlider').addEventListener('input', function() {
  state.radius = parseInt(this.value);
  document.getElementById('radiusValue').textContent = state.radius + 'px';
  onControlChange();
});

// Shadow
document.getElementById('shadowSelect').addEventListener('change', function() {
  state.shadow = this.value;
  onControlChange();
});

// Spacing
document.getElementById('spacingSlider').addEventListener('input', function() {
  state.spacing = parseFloat(this.value);
  document.getElementById('spacingValue').textContent = state.spacing.toFixed(2) + 'x';
  onControlChange();
});

// Copy prompt
document.getElementById('copyBtn').addEventListener('click', function() {
  var diff = document.getElementById('diffOutput').textContent;
  var rationale = document.getElementById('rationale').value.trim();
  var prompt = '## Design Token Changes\n\n';
  if (diff === 'No changes yet.') {
    prompt += '(no changes from defaults)\n';
  } else {
    prompt += diff + '\n';
  }
  if (rationale) {
    prompt += '\n## Rationale\n\n' + rationale + '\n';
  }
  prompt += '\n## Instructions\n\nApply these design token overrides to the project CSS custom properties in :root. Regenerate derived values (accent-hv, accent-soft) from the new accent color.\n';

  navigator.clipboard.writeText(prompt).then(function() {
    document.getElementById('copyFeedback').textContent = 'Copied!';
    setTimeout(function() { document.getElementById('copyFeedback').textContent = ''; }, 2000);
  });
});

// Reset
document.getElementById('resetBtn').addEventListener('click', function() {
  Object.assign(state, DEFAULTS);
  syncControlsFromState();
  onControlChange();
});

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
syncControlsFromState();
renderPreview();
updateDiff();
</script>
</body>
</html>
