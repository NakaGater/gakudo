<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#B8A88A;font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#B8A88A;padding:40px 20px;">
    <tr>
      <td align="center">
        <!-- Book cover card -->
        <table width="420" cellpadding="0" cellspacing="0" style="background:linear-gradient(145deg,#D14B40 0%,#A83C32 100%);border-radius:6px 16px 16px 6px;border-left:6px solid #8B2E25;box-shadow:-4px 0 0 #8B2E25,-6px 2px 12px rgba(59,47,32,.25),4px 4px 16px rgba(59,47,32,.2);">
          <!-- Inner border wrapper -->
          <tr>
            <td style="padding:14px;">
              <table width="100%" cellpadding="0" cellspacing="0" style="border:2px solid rgba(201,165,32,.4);border-radius:4px 10px 10px 4px;">
                <tr>
                  <td style="padding:30px 28px;">
                    <!-- Star + Title -->
                    <table width="100%" cellpadding="0" cellspacing="0">
                      <tr>
                        <td align="center" style="padding-bottom:24px;">
                          <div style="display:inline-block;width:56px;height:56px;background:#FFD93D;border-radius:50%;border:3px solid #E8B830;text-align:center;line-height:56px;font-size:26px;box-shadow:0 4px 12px rgba(255,217,61,.35);">⭐</div>
                          <h1 style="margin:10px 0 0;font-size:20px;color:#FFFFFF;font-weight:900;letter-spacing:.06em;text-shadow:0 2px 4px rgba(0,0,0,.2);">
                            星ヶ丘こどもクラブ
                          </h1>
                        </td>
                      </tr>
                    </table>

                    <!-- Form area -->
                    <table width="100%" cellpadding="0" cellspacing="0" style="background:rgba(255,255,255,.12);border-radius:8px;">
                      <tr>
                        <td style="padding:24px 20px;">
                          <p style="font-size:15px;color:#FFFFFF;line-height:1.8;margin:0 0 20px;text-align:center;">
                            パスワードのリセットが要求されました。<br>
                            下のボタンから新しいパスワードを<br>設定してください。
                          </p>
                          <!-- CTA Button -->
                          <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                              <td align="center" style="padding:8px 0 16px;">
                                <a href="{{ .ConfirmationURL }}"
                                   style="display:inline-block;background:#FFD93D;color:#3B2F20;font-size:16px;font-weight:900;text-decoration:none;padding:14px 36px;border-radius:8px;box-shadow:0 3px 0 #E8B830;">
                                  パスワードをリセット
                                </a>
                              </td>
                            </tr>
                          </table>
                          <p style="font-size:12px;color:rgba(255,255,255,.6);line-height:1.7;margin:0;text-align:center;">
                            このリンクは24時間有効です<br>
                            心当たりがない場合は無視してください
                          </p>
                        </td>
                      </tr>
                    </table>

                    <!-- URL fallback -->
                    <table width="100%" cellpadding="0" cellspacing="0" style="margin-top:16px;">
                      <tr>
                        <td style="border-top:1px dashed rgba(255,255,255,.3);padding-top:14px;">
                          <p style="font-size:11px;color:rgba(255,255,255,.5);line-height:1.6;margin:0;">
                            ボタンが表示されない場合：<br>
                            <a href="{{ .ConfirmationURL }}" style="color:#FFD93D;word-break:break-all;font-size:11px;">{{ .ConfirmationURL }}</a>
                          </p>
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>

        <!-- Footer -->
        <table width="420" cellpadding="0" cellspacing="0" style="margin-top:16px;">
          <tr>
            <td align="center">
              <p style="font-size:11px;color:rgba(59,47,32,.5);margin:0;line-height:1.6;">
                ⭐ 星ヶ丘こどもクラブ<br>
                〒464-0021 名古屋市千種区星が丘1-5 ｜ TEL: 052-783-1447
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
