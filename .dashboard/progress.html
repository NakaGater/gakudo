<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Build Progress Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-elev: #161b22;
      --bg-elev-2: #1c2128;
      --fg: #e6edf3;
      --fg-muted: #7d8590;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --border: #30363d;
      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }
    header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 { margin: 0; font-size: 20px; font-weight: 600; }
    .meta { color: var(--fg-muted); font-size: 13px; }
    main { padding: 24px 32px; display: grid; gap: 20px; max-width: 1400px; }
    section {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    section > header.section-head {
      padding: 12px 20px;
      background: var(--bg-elev-2);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    section > header.section-head:hover { background: #22272e; }
    section > .section-body { padding: 16px 20px; }
    section.collapsed > .section-body { display: none; }
    .phase-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .phase-pill {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      text-align: center;
      font-size: 13px;
    }
    .phase-pill.pending { color: var(--fg-muted); }
    .phase-pill.in_progress { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.08); }
    .phase-pill.complete { border-color: var(--success); color: var(--success); background: rgba(63,185,80,0.08); }
    .progress-bar {
      width: 100%;
      height: 10px;
      background: var(--bg-elev-2);
      border-radius: 5px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      transition: width 0.3s ease;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    th { color: var(--fg-muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    td.mono, th.mono, code, pre { font-family: var(--mono); font-size: 12px; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .status-badge.pending { background: rgba(125,133,144,0.15); color: var(--fg-muted); }
    .status-badge.in_progress { background: rgba(88,166,255,0.15); color: var(--accent); }
    .status-badge.DONE { background: rgba(63,185,80,0.15); color: var(--success); }
    .status-badge.DONE_WITH_CONCERNS { background: rgba(210,153,34,0.15); color: var(--warning); }
    .status-badge.BLOCKED, .status-badge.NEEDS_CONTEXT { background: rgba(248,81,73,0.15); color: var(--danger); }
    .tokens-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .token-card { padding: 12px; background: var(--bg-elev-2); border-radius: 6px; }
    .token-card .label { color: var(--fg-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .token-card .value { font-size: 20px; font-weight: 600; margin-top: 4px; font-family: var(--mono); }
    .timeline { position: relative; padding-left: 20px; }
    .timeline::before { content: ''; position: absolute; left: 6px; top: 6px; bottom: 6px; width: 2px; background: var(--border); }
    .timeline-item { position: relative; padding: 6px 0; font-size: 13px; }
    .timeline-item::before { content: ''; position: absolute; left: -18px; top: 11px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
    .timeline-item.escalation::before { background: var(--danger); }
    .timeline-item.gate::before { background: var(--warning); }
    .timeline-item .ts { color: var(--fg-muted); font-family: var(--mono); margin-right: 8px; }
    .commit-group { margin-bottom: 16px; }
    .commit-group h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--fg-muted); margin: 0 0 8px; }
    .commit { padding: 6px 0; font-size: 13px; border-bottom: 1px dashed var(--border); }
    .commit .sha { color: var(--accent); font-family: var(--mono); margin-right: 8px; cursor: pointer; }
    .commit .files { margin: 4px 0 0 20px; font-size: 12px; color: var(--fg-muted); display: none; }
    .commit.open .files { display: block; }
    .chart { font-family: var(--mono); white-space: pre; font-size: 12px; line-height: 1.3; color: var(--fg-muted); }
    .chart .bar { color: var(--accent); }
    .empty { color: var(--fg-muted); font-style: italic; padding: 8px 0; }
  </style>
</head>
<body>
<header>
  <div>
    <h1>Build Progress Dashboard</h1>
    <div class="meta" id="sessionMeta">session: —</div>
  </div>
  <div class="meta" id="lastUpdated">generated: —</div>
</header>
<main>
  <section id="sec-phases"><header class="section-head" onclick="toggle(this)"><span>Phases</span><span>▾</span></header>
    <div class="section-body">
      <div id="phaseRow" class="phase-row"></div>
      <div>Overall: <span id="overallPct">0%</span></div>
      <div class="progress-bar"><span id="overallBar" style="width:0%"></span></div>
    </div>
  </section>

  <section id="sec-tasks"><header class="section-head" onclick="toggle(this)"><span>Tasks</span><span>▾</span></header>
    <div class="section-body">
      <table id="taskTable">
        <thead><tr><th>#</th><th>Title</th><th>Status</th><th>Agent</th><th>Spec</th><th>Quality</th><th class="mono">Tokens</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <section id="sec-tokens"><header class="section-head" onclick="toggle(this)"><span>Tokens &amp; cost</span><span>▾</span></header>
    <div class="section-body">
      <div class="tokens-grid">
        <div class="token-card"><div class="label">Total tokens</div><div class="value" id="totalTokens">0</div></div>
        <div class="token-card"><div class="label">Estimated cost</div><div class="value" id="totalCost">$0.00</div></div>
        <div class="token-card"><div class="label">Tool calls</div><div class="value" id="totalCalls">0</div></div>
      </div>
      <div style="margin-top:16px"><strong>By phase</strong></div>
      <table style="margin-top:8px"><thead><tr><th>Phase</th><th class="mono">Input</th><th class="mono">Output</th><th class="mono">Cache</th></tr></thead>
        <tbody id="phaseTokens"></tbody>
      </table>
    </div>
  </section>

  <section id="sec-timeline"><header class="section-head" onclick="toggle(this)"><span>Timeline</span><span>▾</span></header>
    <div class="section-body"><div id="timeline" class="timeline"></div></div>
  </section>

  <section id="sec-gan"><header class="section-head" onclick="toggle(this)"><span>GAN design score</span><span>▾</span></header>
    <div class="section-body"><pre id="ganChart" class="chart"></pre></div>
  </section>

  <section id="sec-commits"><header class="section-head" onclick="toggle(this)"><span>Commits</span><span>▾</span></header>
    <div class="section-body"><div id="commitGroups"></div></div>
  </section>
</main>

<script>
// --- DATA INJECTION POINT ---
// generate-dashboard.js replaces the line below with an actual
// assignment like: var __SUMMARY__ = {...};
var __SUMMARY__ = {"session":{"started_at":null,"last_event_at":"2026-04-19T16:24:25.794Z","platform":"unknown"},"phases":{"discovery":{"status":"complete","started_at":"2026-04-19T16:24:16.346Z","completed_at":"2026-04-19T16:24:16.390Z","tokens":{"input":0,"output":0,"cache":0},"commits":[]},"design":{"status":"complete","started_at":"2026-04-19T16:24:16.480Z","completed_at":"2026-04-19T16:24:16.743Z","tokens":{"input":0,"output":0,"cache":0},"commits":[]},"build":{"status":"in_progress","started_at":"2026-04-19T16:24:16.787Z","completed_at":null,"tokens":{"input":0,"output":0,"cache":0},"commits":[]},"verify":{"status":"pending","started_at":null,"completed_at":null,"tokens":{"input":0,"output":0,"cache":0},"commits":[]},"ship":{"status":"pending","started_at":null,"completed_at":null,"tokens":{"input":0,"output":0,"cache":0},"commits":[]}},"gates":{"prd":{"by":"human","at":"2026-04-19T16:24:16.436Z"},"tech-stack":{"by":"human","at":"2026-04-19T16:24:16.524Z"},"design":{"by":"human","at":"2026-04-19T16:24:16.700Z"}},"tasks":[{"id":"unknown-task","title":"unknown-task","status":"DONE","agent":null,"tokens":{"input":0,"output":0,"cache":0},"started_at":null,"completed_at":"2026-04-19T16:24:25.794Z","reviews":{"spec":null,"quality":null}}],"gan_iterations":[{"iteration":1,"score":31,"max":40,"ts":"2026-04-19T16:24:16.568Z"},{"iteration":2,"score":35,"max":40,"ts":"2026-04-19T16:24:16.612Z"},{"iteration":3,"score":36,"max":40,"ts":"2026-04-19T16:24:16.656Z"}],"commits":[],"escalations":[],"totals":{"tokens":{"input":0,"output":0,"cache":0},"tool_calls":0,"estimated_cost_usd":0},"generated_at":"2026-04-19T16:24:30.247Z"};

function toggle(el) {
  el.parentElement.classList.toggle('collapsed');
}

function fmtNum(n) {
  n = n || 0;
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function totalTokens(t) {
  t = t || {};
  return (t.input || 0) + (t.output || 0) + (t.cache || 0);
}

function render(summary) {
  if (!summary) {
    document.getElementById('sessionMeta').textContent = 'no data yet';
    return;
  }

  document.getElementById('sessionMeta').textContent =
    'platform: ' + (summary.session.platform || 'unknown') +
    ' · started: ' + (summary.session.started_at || '—');
  document.getElementById('lastUpdated').textContent =
    'generated: ' + (summary.generated_at || '—');

  // Phases
  var phases = ['discovery', 'design', 'build', 'verify', 'ship'];
  var row = document.getElementById('phaseRow');
  row.innerHTML = '';
  var completed = 0;
  phases.forEach(function (p) {
    var ph = summary.phases[p] || { status: 'pending' };
    if (ph.status === 'complete') completed++;
    var div = document.createElement('div');
    div.className = 'phase-pill ' + ph.status;
    div.textContent = p + ' · ' + ph.status;
    row.appendChild(div);
  });
  var pct = Math.round((completed / phases.length) * 100);
  document.getElementById('overallPct').textContent = pct + '%';
  document.getElementById('overallBar').style.width = pct + '%';

  // Tasks
  var tbody = document.querySelector('#taskTable tbody');
  tbody.innerHTML = '';
  if (!summary.tasks.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">No tasks yet.</td></tr>';
  } else {
    summary.tasks.forEach(function (t, i) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="mono">' + (i + 1) + '</td>' +
        '<td>' + escapeHtml(t.title) + '</td>' +
        '<td><span class="status-badge ' + t.status + '">' + t.status + '</span></td>' +
        '<td>' + escapeHtml(t.agent || '—') + '</td>' +
        '<td>' + (t.reviews.spec || '—') + '</td>' +
        '<td>' + (t.reviews.quality || '—') + '</td>' +
        '<td class="mono">' + fmtNum(totalTokens(t.tokens)) + '</td>';
      tbody.appendChild(tr);
    });
  }

  // Tokens
  var totTok = totalTokens(summary.totals.tokens);
  document.getElementById('totalTokens').textContent = fmtNum(totTok);
  document.getElementById('totalCost').textContent =
    '$' + (summary.totals.estimated_cost_usd || 0).toFixed(2);
  document.getElementById('totalCalls').textContent = summary.totals.tool_calls || 0;
  var ptBody = document.getElementById('phaseTokens');
  ptBody.innerHTML = '';
  phases.forEach(function (p) {
    var ph = summary.phases[p] || { tokens: {} };
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + p + '</td>' +
      '<td class="mono">' + fmtNum(ph.tokens.input) + '</td>' +
      '<td class="mono">' + fmtNum(ph.tokens.output) + '</td>' +
      '<td class="mono">' + fmtNum(ph.tokens.cache) + '</td>';
    ptBody.appendChild(tr);
  });

  // Timeline
  var tl = document.getElementById('timeline');
  tl.innerHTML = '';
  var events = [];
  phases.forEach(function (p) {
    var ph = summary.phases[p];
    if (ph.started_at) events.push({ ts: ph.started_at, text: 'phase-start: ' + p, cls: '' });
    if (ph.completed_at) events.push({ ts: ph.completed_at, text: 'phase-complete: ' + p, cls: '' });
  });
  Object.keys(summary.gates || {}).forEach(function (g) {
    var val = summary.gates[g];
    if (val) events.push({ ts: val.at, text: 'gate-approved: ' + g + ' (by ' + val.by + ')', cls: 'gate' });
  });
  summary.tasks.forEach(function (t) {
    if (t.started_at) events.push({ ts: t.started_at, text: 'task-start: ' + t.title, cls: '' });
    if (t.completed_at) events.push({ ts: t.completed_at, text: 'task-complete: ' + t.title + ' (' + t.status + ')', cls: '' });
  });
  (summary.escalations || []).forEach(function (e) {
    events.push({ ts: e.ts, text: 'escalation: ' + e.task + ' — ' + e.reason, cls: 'escalation' });
  });
  events.sort(function (a, b) { return (a.ts || '').localeCompare(b.ts || ''); });
  if (!events.length) {
    tl.innerHTML = '<div class="empty">No events yet.</div>';
  } else {
    events.forEach(function (e) {
      var d = document.createElement('div');
      d.className = 'timeline-item ' + e.cls;
      d.innerHTML = '<span class="ts">' + (e.ts || '') + '</span>' + escapeHtml(e.text);
      tl.appendChild(d);
    });
  }

  // GAN chart
  var gan = summary.gan_iterations || [];
  var chart = document.getElementById('ganChart');
  if (!gan.length) {
    chart.textContent = 'No GAN iterations recorded.';
  } else {
    var max = Math.max.apply(null, gan.map(function (g) { return g.max || 40; }));
    var lines = [];
    for (var score = max; score >= 0; score -= 4) {
      var row = String(score).padStart(3, ' ') + ' |';
      gan.forEach(function (g) {
        row += (g.score >= score - 2 && g.score <= score + 2) ? ' ●' : '  ';
      });
      lines.push(row);
    }
    lines.push('    +' + gan.map(function (_) { return '--'; }).join('') + '-> iter');
    lines.push('     ' + gan.map(function (g) { return ' ' + g.iteration; }).join(''));
    chart.textContent = lines.join('\n');
  }

  // Commits
  var groups = document.getElementById('commitGroups');
  groups.innerHTML = '';
  var byPhase = {};
  (summary.commits || []).forEach(function (c) {
    byPhase[c.phase] = byPhase[c.phase] || [];
    byPhase[c.phase].push(c);
  });
  if (!summary.commits.length) {
    groups.innerHTML = '<div class="empty">No commits yet.</div>';
  } else {
    phases.concat(['unknown']).forEach(function (p) {
      var commits = byPhase[p];
      if (!commits || !commits.length) return;
      var g = document.createElement('div');
      g.className = 'commit-group';
      g.innerHTML = '<h3>' + p + ' (' + commits.length + ')</h3>';
      commits.forEach(function (c) {
        var el = document.createElement('div');
        el.className = 'commit';
        el.innerHTML =
          '<span class="sha" onclick="this.parentElement.classList.toggle(\'open\')">' + escapeHtml(c.sha || '') + '</span>' +
          escapeHtml(c.message || '') +
          '<div class="files">' + (c.files || []).map(escapeHtml).join('<br>') + '</div>';
        g.appendChild(el);
      });
      groups.appendChild(g);
    });
  }
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
  });
}

render(__SUMMARY__);
</script>
</body>
</html>
