name: E2E (manual)

# Phase 0-A's auto-trigger was removed: the workflow needs the full
# Supabase + Mailpit + Next.js stack to be up to actually pass, which
# CI doesn't currently provision. Until that's wired up, the workflow
# stays available via `workflow_dispatch` so anyone can trigger it
# from the Actions tab once they've supplied the right secrets, but
# it doesn't gate PRs / pushes anymore.
#
# Re-enabling auto-trigger requires either:
#   1. A `services:` block with a Supabase Postgres + Mailpit, plus
#      `npm run start` orchestration, OR
#   2. Supabase Cloud preview branches with seeded data.
# Tracked in docs/production-launch-checklist.md.

on:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        run: npm run e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL || 'http://localhost:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY || 'dummy-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY || 'dummy-service-role-key' }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: dummy-vapid-public
          VAPID_PRIVATE_KEY: dummy-vapid-private
          RESEND_API_KEY: dummy-resend
          NEXT_PUBLIC_APP_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
